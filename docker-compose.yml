version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KP_API_KEY=${KP_API_KEY}
      - ML_API_URL=http://ml:8100
    depends_on:
      - ml

  ml:
    build:
      context: .
      dockerfile: ml/Dockerfile
    ports:
      - "8100:8100"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ML_PORT=8100
    volumes:
      - ./ml/models:/app/ml/models

version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3020:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KP_API_KEY=${KP_API_KEY}
      - ML_API_URL=http://ml:8100
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID}
    depends_on:
      - ml
    networks:
      - default
      - coolify

  ml:
    build:
      context: .
      dockerfile: ml/Dockerfile
    expose:
      - "8100"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ML_PORT=8100
    volumes:
      - ml_models:/app/ml/models
    networks:
      - default
      - coolify

volumes:
  ml_models:

networks:
  coolify:
    external: true
